
name: Build LogMergeTool_NoExcel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    env:
      APP_NAME: LogMergeTool_NoExcel
      MAIN_PY: LogMergeTool_NoExcel_Main.py

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify source file
        shell: pwsh
        run: |
          if (!(Test-Path "${{ env.MAIN_PY }}")) {
            Write-Error "${{ env.MAIN_PY }} not found."
            exit 1
          }

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade `
            nuitka `
            PySide6 `
            openpyxl `
            ordered-set `
            zstandard

      - name: Verify Python compile
        shell: pwsh
        run: |
          python -m py_compile "${{ env.MAIN_PY }}"

      - name: Clean old output
        shell: pwsh
        run: |
          Remove-Item build -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item dist -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "${{ env.APP_NAME }}.build" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "${{ env.APP_NAME }}.dist" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "${{ env.APP_NAME }}.onefile-build" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item nuitka-crash-report.xml -Force -ErrorAction SilentlyContinue

      - name: Build EXE with Nuitka
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --nofollow-import-to=numpy `
            --nofollow-import-to=pandas `
            --nofollow-import-to=scipy `
            --nofollow-import-to=matplotlib `
            --nofollow-import-to=PIL `
            --company-name="LogMerge" `
            --product-name="Log Merge Tool No Excel" `
            --file-description="Log Merge Tool No Excel" `
            --file-version=2.3.0.0 `
            --product-version=2.3.0.0 `
            --output-filename="${{ env.APP_NAME }}.exe" `
            --output-dir=dist `
            --include-data-file=csa_error_rules.json=csa_error_rules.json `
            --include-data-file=site_serial_map.json=site_serial_map.json `
            "${{ env.MAIN_PY }}"

      - name: Verify output
        shell: pwsh
        run: |
          Get-ChildItem dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LogMergeTool_NoExcel
          path: dist/LogMergeTool_NoExcel.exe
